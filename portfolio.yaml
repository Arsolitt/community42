apiVersion: apps/v1
kind: Deployment
metadata:
  name: community
  namespace: community
spec:
  replicas: 1
  selector:
    matchLabels:
      app: community-portfolio
  template:
    metadata:
      labels:
        app: community-portfolio
    spec:
      containers:
        - image: harbor.arsolitt.tech/community42/portfolio:v0.95
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: http
              scheme: HTTP
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 15
          name: community
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          startupProbe:
            failureThreshold: 10
            httpGet:
              path: /
              port: http
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 15
      imagePullSecrets:
        - name: image-pull-secret
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: community
  namespace: community
spec:
  ports:
    - name: http
      port: 3000
      protocol: TCP
      targetPort: http
  selector:
    app: community-portfolio
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  # nginx.ingress.kubernetes.io/add-base-url: "true"
  # nginx.ingress.kubernetes.io/rewrite-target: /
  name: community
  namespace: community
spec:
  ingressClassName: nginx
  rules:
    - host: community42.ru
      http:
        paths:
          - backend:
              service:
                name: community
                port:
                  number: 3000
            path: /
            pathType: Prefix
